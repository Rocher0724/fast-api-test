<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>데이터 플로우 다이어그램 — 에러 학습 API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/dark-mode.css">
  <style>
    .dataflow-container {
      max-width: 1200px;
      margin: calc(var(--header-height) + var(--space-8)) auto var(--space-8);
      padding: 0 var(--space-6);
    }
    .dataflow-title {
      font-family: var(--font-heading);
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: var(--space-2);
    }
    .dataflow-subtitle {
      color: var(--color-text-secondary);
      margin-bottom: var(--space-6);
    }
    .diagram-card {
      background: var(--color-bg-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border-light);
      padding: var(--space-6);
      margin-bottom: var(--space-6);
    }
    .diagram-card h3 {
      font-family: var(--font-heading);
      font-size: 1.125rem;
      margin-bottom: var(--space-4);
    }
    .mermaid {
      text-align: center;
      overflow-x: auto;
    }
    .diagram-tabs {
      margin-bottom: var(--space-6);
    }
  </style>
</head>
<body>
  <!-- Nav header -->
  <header class="nav-header">
    <div class="nav-container">
      <a href="/" class="nav-logo">에러 학습 API</a>
      <nav class="nav-links">
        <a href="/lecture" class="nav-link">강의</a>
        <a href="/dashboard" class="nav-link">대시보드</a>
        <a href="/dataflow" class="nav-link active">다이어그램</a>
        <a href="/docs" target="_blank" class="nav-link">API Docs</a>
      </nav>
      <button class="theme-toggle" id="themeToggle" aria-label="다크모드 토글">
        <span class="theme-icon"></span>
      </button>
    </div>
  </header>

  <div class="dataflow-container">
    <h1 class="dataflow-title">데이터 플로우 다이어그램</h1>
    <p class="dataflow-subtitle">FE → 서버 → DB 전체 흐름과 에러 발생 지점을 시각적으로 확인합니다.</p>

    <!-- Tabs for each diagram -->
    <div class="diagram-tabs">
      <div class="tab-nav" id="diagramTabs">
        <button class="tab-btn active" data-diagram="0">전체 흐름</button>
        <button class="tab-btn" data-diagram="1">요청 상세</button>
        <button class="tab-btn" data-diagram="2">확인 도구</button>
        <button class="tab-btn" data-diagram="3">배포 흐름</button>
      </div>
    </div>

    <!-- Diagram containers -->
    <div class="tab-content" id="diagramContent">
      <div class="tab-pane active diagram-card" id="diagram-0">
        <h3>전체 데이터 흐름과 에러 발생 지점</h3>
        <div class="mermaid" id="mermaid-0"></div>
      </div>
      <div class="tab-pane diagram-card" id="diagram-1">
        <h3>요청(Request) 흐름 상세</h3>
        <div class="mermaid" id="mermaid-1"></div>
      </div>
      <div class="tab-pane diagram-card" id="diagram-2">
        <h3>에러 확인 장소 요약</h3>
        <div class="mermaid" id="mermaid-2"></div>
      </div>
      <div class="tab-pane diagram-card" id="diagram-3">
        <h3>배포 환경에서의 데이터 흐름</h3>
        <div class="mermaid" id="mermaid-3"></div>
      </div>
    </div>
  </div>

  <script src="/static/js/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="/static/js/dataflow.js"></script>
</body>
</html>
