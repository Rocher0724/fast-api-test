<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>에러 테스트 대시보드 — 에러 학습 API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link id="hljs-theme" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css">
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/css/dark-mode.css">
</head>
<body>
  <!-- Nav header -->
  <header class="nav-header">
    <div class="nav-container">
      <button class="menu-toggle" id="menuToggle" aria-label="메뉴">☰</button>
      <a href="/" class="nav-logo">에러 학습 API</a>
      <nav class="nav-links">
        <a href="/lecture" class="nav-link">강의</a>
        <a href="/dashboard" class="nav-link active">대시보드</a>
        <a href="/dataflow" class="nav-link">다이어그램</a>
        <a href="/docs" target="_blank" class="nav-link">API Docs</a>
      </nav>
      <button class="theme-toggle" id="themeToggle" aria-label="다크모드 토글">
        <span class="theme-icon"></span>
      </button>
    </div>
  </header>

  <!-- 3-panel layout -->
  <div class="dashboard-layout">
    <!-- Panel 1: Categories sidebar -->
    <aside class="sidebar" id="categorySidebar">
      <div class="sidebar-title">카테고리</div>
      <nav id="categoryNav">
        <!-- Filled by JS from APP_CONFIG.CATEGORIES -->
      </nav>
      <div class="auth-panel" id="authPanel">
        <div class="sidebar-title">인증 토큰</div>
        <div class="auth-status" id="authStatus">토큰 없음</div>
      </div>
    </aside>

    <!-- Panel 2: Endpoint list -->
    <div class="endpoint-panel" id="endpointPanel">
      <div class="endpoint-panel-header">
        <h2 id="categoryTitle">카테고리를 선택하세요</h2>
        <span class="endpoint-count" id="endpointCount"></span>
      </div>
      <div class="endpoint-list" id="endpointList">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- Panel 3: Response panel -->
    <div class="response-panel" id="responsePanel">
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="response">응답</button>
        <button class="tab-btn" data-tab="request">요청</button>
        <button class="tab-btn" data-tab="learning">학습</button>
      </div>
      <div class="tab-content">
        <div class="tab-pane active" id="tabResponse">
          <div class="response-placeholder">엔드포인트를 실행하면 여기에 응답이 표시됩니다</div>
        </div>
        <div class="tab-pane" id="tabRequest">
          <div class="response-placeholder">요청 정보가 여기에 표시됩니다</div>
        </div>
        <div class="tab-pane" id="tabLearning">
          <div class="response-placeholder">학습 힌트가 여기에 표시됩니다</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile drawer -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer">
    <div class="sidebar-title">카테고리</div>
    <nav id="drawerCategoryNav"></nav>
  </aside>

  <script src="/static/js/theme.js"></script>
  <script src="/static/js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
